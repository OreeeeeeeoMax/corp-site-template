<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网站作品集</title>
  <link rel="stylesheet" href="src/input.css" />
  <style>
    :root {
      --font-heading: 'Noto Serif SC', serif;
      --font-display: 'Playfair Display', serif;
    }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }

    /* 网站缩略图卡片 */
    .site-card {
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .site-card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    }

    /* 浏览器顶栏 */
    .browser-bar {
      background: #e5e7eb;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .browser-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .browser-dot:nth-child(1) { background: #ef4444; }
    .browser-dot:nth-child(2) { background: #f59e0b; }
    .browser-dot:nth-child(3) { background: #22c55e; }
    .browser-url {
      flex: 1;
      background: #fff;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 10px;
      color: #9ca3af;
      margin-left: 6px;
      font-family: monospace;
    }

    /* 网站预览区 */
    .preview {
      height: 220px;
      position: relative;
      overflow: hidden;
    }

    /* === 餐厅预览 === */
    .preview-restaurant {
      background: linear-gradient(135deg, #1c1108, #3d2410);
    }
    .preview-restaurant .preview-hero-img {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&q=80') center/cover;
      opacity: 0.5;
    }
    .preview-restaurant .preview-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(28,17,8,0.7), rgba(28,17,8,0.3));
    }
    .preview-restaurant .preview-nav {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      color: #fff;
    }
    .preview-restaurant .preview-logo {
      font-family: 'Noto Serif SC', serif;
      font-weight: 700; font-size: 13px;
      color: #d97706;
    }
    .preview-restaurant .preview-nav-links {
      display: flex; gap: 12px;
    }
    .preview-restaurant .preview-nav-links span {
      font-size: 9px; color: rgba(255,255,255,0.7);
    }
    .preview-restaurant .preview-nav-links span:first-child {
      color: #fff;
      border-bottom: 1.5px solid #d97706;
      padding-bottom: 2px;
    }
    .preview-restaurant .preview-center {
      position: relative; z-index: 1;
      text-align: center;
      padding-top: 50px;
      color: #fff;
    }
    .preview-restaurant .preview-center h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px; font-weight: 600;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .preview-restaurant .preview-center p {
      font-size: 9px; opacity: 0.8; margin-bottom: 14px;
    }
    .preview-restaurant .preview-btn {
      display: inline-block;
      background: #b45309; color: #fff;
      padding: 5px 18px; border-radius: 6px;
      font-size: 9px; font-weight: 500;
    }
    .preview-restaurant .preview-cards {
      position: relative; z-index: 1;
      display: flex; gap: 8px;
      padding: 0 12px; margin-top: 20px;
    }
    .preview-restaurant .preview-card-item {
      flex: 1; height: 50px; border-radius: 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
    }

    /* === 医美预览 === */
    .preview-beauty {
      background: linear-gradient(135deg, #1a0a14, #3d1228);
    }
    .preview-beauty .preview-hero-img {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=800&q=80') center/cover;
      opacity: 0.45;
    }
    .preview-beauty .preview-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(26,10,20,0.65), rgba(26,10,20,0.25));
    }
    .preview-beauty .preview-nav {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      color: #fff;
    }
    .preview-beauty .preview-logo {
      font-family: 'Noto Serif SC', serif;
      font-weight: 700; font-size: 13px;
      color: #ec4899;
    }
    .preview-beauty .preview-nav-links {
      display: flex; gap: 12px;
    }
    .preview-beauty .preview-nav-links span {
      font-size: 9px; color: rgba(255,255,255,0.7);
    }
    .preview-beauty .preview-nav-links span:first-child {
      color: #fff;
      border-bottom: 1.5px solid #ec4899;
      padding-bottom: 2px;
    }
    .preview-beauty .preview-center {
      position: relative; z-index: 1;
      text-align: center;
      padding-top: 50px;
      color: #fff;
    }
    .preview-beauty .preview-center h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px; font-weight: 600;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .preview-beauty .preview-center p {
      font-size: 9px; opacity: 0.8; margin-bottom: 14px;
    }
    .preview-beauty .preview-btn {
      display: inline-block;
      background: #db2777; color: #fff;
      padding: 5px 18px; border-radius: 6px;
      font-size: 9px; font-weight: 500;
    }
    .preview-beauty .preview-cards {
      position: relative; z-index: 1;
      display: flex; gap: 8px;
      padding: 0 12px; margin-top: 20px;
    }
    .preview-beauty .preview-card-item {
      flex: 1; height: 50px; border-radius: 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
    }

    /* === 科技预览 === */
    .preview-tech {
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
    }
    .preview-tech .preview-hero-img {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80') center/cover;
      opacity: 0.5;
    }
    .preview-tech .preview-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(15,23,42,0.65), rgba(15,23,42,0.25));
    }
    .preview-tech .preview-nav {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      color: #fff;
    }
    .preview-tech .preview-logo {
      font-family: 'Noto Serif SC', serif;
      font-weight: 700; font-size: 13px;
      color: #3b82f6;
    }
    .preview-tech .preview-nav-links {
      display: flex; gap: 12px;
    }
    .preview-tech .preview-nav-links span {
      font-size: 9px; color: rgba(255,255,255,0.7);
    }
    .preview-tech .preview-nav-links span:first-child {
      color: #fff;
      border-bottom: 1.5px solid #3b82f6;
      padding-bottom: 2px;
    }
    .preview-tech .preview-center {
      position: relative; z-index: 1;
      text-align: center;
      padding-top: 50px;
      color: #fff;
    }
    .preview-tech .preview-center h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px; font-weight: 600;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .preview-tech .preview-center p {
      font-size: 9px; opacity: 0.8; margin-bottom: 14px;
    }
    .preview-tech .preview-btn {
      display: inline-block;
      background: #2563eb; color: #fff;

    }
    .preview-tech .preview-cards {
      position: relative; z-index: 1;
      display: flex; gap: 8px;
      padding: 0 12px; margin-top: 20px;
    }
    .preview-tech .preview-card-item {
      flex: 1; height: 50px; border-radius: 8px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

            <span class="preview-btn">了解更多</span>
          </div>
          <div class="preview-cards">
            <div class="preview-card-item"></div>
            <div class="preview-card-item"></div>
            <div class="preview-card-item"></div>
          </div>
        </div>
        <div class="p-5 bg-gray-50">
          <h2 class="text-gray-800 text-base font-bold mb-1" style="font-family: var(--font-heading);">悦颜医疗美容</h2>
          <p class="text-gray-400 text-xs">医美诊所官网 · 粉色主题 · 5页</p>
        </div>

      <!-- 科技 -->
      <a href="sites/tech/" class="site-card">
        <div class="browser-bar">
          <div class="browser-dot"></div>
          <div class="browser-dot"></div>
          <div class="browser-dot"></div>

        </div>
        <div class="preview preview-tech">
          <div class="preview-hero-img"></div>

  <script type="module" src="src/js/main.js"></script>

</html>
